version: '3.8'
services:
  driverag:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src  # real-time updates for development
      - ./chroma_db:/app/chroma_db
      - ./credentials:/app/credentials
    env_file:
      - .env
    environment:
      - STREAMLIT_SERVER_RUN_ON_SAVE=true   # Recharge dès que tu sauvegardes